[tool:pytest]
# ============================================================================
# Pytest Configuration for Data Warehouse Testing Framework
# ============================================================================
# This configuration supports testing across multiple data sources (Team Tailor, etc.)
# and Medallion Architecture layers (Raw, Bronze, Silver, Gold)

# Test Discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Plugin configuration
plugins = integration-mark

# Markers for different test types
markers =
    unit: Unit tests - fast, isolated, no external dependencies
    integration: Integration tests - test component interactions
    e2e: End-to-end tests - full pipeline testing
    performance: Performance tests - load and performance testing
    slow: Slow tests - tests that take more than 5 seconds
    teamtailor: Tests specific to Team Tailor data source
    meta: Tests specific to Meta data source (future)
    raw: Tests for Raw layer
    bronze: Tests for Bronze layer
    silver: Tests for Silver layer
    gold: Tests for Gold layer
    engagement: Tests for engagement domain
    marketing: Tests for marketing domain

# Test Execution
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --disable-warnings
    --color=yes
    --durations=10

# Filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pyspark.*
    ignore::UserWarning:py4j.*

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (if pytest-cov is installed)
# addopts = --cov=libs --cov=jobs --cov-report=html --cov-report=term-missing

# Test Timeout (if pytest-timeout is installed)
timeout = 300
timeout_method = thread
