# Pre-commit configuration for Data Engineering Jobs Pipeline
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_stages: [pre-commit]
default_language_version:
  python: python3

repos:
  # Core pre-commit hooks for general file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # File formatting and structure
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: \.ya?ml\.j2$
      - id: check-json
        exclude: |
          (?x)^(
            \.vscode/.*|
            \.devcontainer/.*|
            tools/danger/.*
          )$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]

      # Git and file system checks
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks

      # Content validation
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: |
          (?x)^(
            \.devcontainer/.*|
            \.vscode/.*
          )$

  # Python code formatting and linting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=88]
        # Don't fail if files are reformatted, just reformat them
        stages: [commit]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=88]

  # Python linting with ruff (faster alternative to flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        # Don't fail if files are reformatted, just reformat them
        stages: [commit]

  # Python security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-r, --format, custom, --exclude, tests/]
        exclude: ^tests/

  # Markdown linting for better documentation
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.15.0
    hooks:
      - id: markdownlint-cli2
        language_version: system
        args:
          - --config=.markdownlint.json

  # YAML formatting and linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint]
        exclude: |
          (?x)^(
            .*\.lock.*|
            pnpm-lock\.yaml
          )$

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # Secret scanning for security
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Typo and spelling checks
  - repo: https://github.com/crate-ci/typos
    rev: v1.28.3
    hooks:
      - id: typos
        args: [--config=.typos.toml]
        exclude: |
          (?x)^(
            .*\.lock.*|
            .*\.log.*|
            .git/.*
          )$

  # Jupyter notebook formatting (for local notebooks)
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-black
        args: [--line-length=88]
        additional_dependencies: [black]
      - id: nbqa-isort
        args: [--profile=black]
        additional_dependencies: [isort]

  # Conventional Commits: validate commit messages
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.21.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - '@commitlint/cli@18.6.1'
          - '@commitlint/config-conventional@18.6.1'

  # GitHub Actions workflow linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.1
    hooks:
      - id: actionlint
        args: ["-shellcheck=", "-pyflakes="]
        files: ^\.github/workflows/.*\.ya?ml$

# Configuration for excluding files/directories
exclude: |
  (?x)^(
    \.venv/.*|
    __pycache__/.*|
    \.pytest_cache/.*|
    \.mypy_cache/.*|
    \.ruff_cache/.*|
    .*\.egg-info/.*|
    build/.*|
    dist/.*|
    \.git/.*|
    node_modules/.*|
    jupyter_workspace/.*
  )$
