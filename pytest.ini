[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --durations=10
    --cov=libs
    --cov=jobs
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    slow: Slow running tests that may take more time
    aws: Tests that require AWS services or mocking
    spark: Tests that require Spark functionality
    validation: Tests for parameter validation framework
    config: Tests for configuration management
    public_api: Tests for the public API sample source
    raw: Tests for Raw layer
    bronze: Tests for Bronze layer
    silver: Tests for Silver layer
    gold: Tests for Gold layer
    e2e: End-to-end tests
    performance: Performance tests
    engagement: Tests for engagement domain
    marketing: Tests for marketing domain
