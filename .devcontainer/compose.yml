services:
  # ============================================================
  # Init: SFTP Keys Generation
  # ============================================================
  sftp-keys-init:
    build:
      context: ./docker/sftp-keys-init
      dockerfile: Dockerfile
    container_name: sftp-keys-init
    env_file:
      - ../.env
    volumes:
      # SFTP Keys storage (generated here, shared with other services)
      - sftp-keys:${SFTP_KEYS_DIR:-/keys}

      # Init script
      - ./docker/sftp-keys-init:/scripts:ro
    command: ["/bin/sh", "/scripts/entrypoint.sh"]
    restart: "no"
    networks:
      - glue-iceberg-network

  # ============================================================
  # AWS Glue development environment
  # ============================================================
  awsglue:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: []
    command: ["tail", "-f", "/dev/null"]
    tty: true
    stdin_open: true
    environment:
      DISABLE_SSL: "true"
      SPARK_CONF_DIR: /opt/spark/conf
      PIPENV_VENV_IN_PROJECT: "1"
    env_file:
      - ../.env
    ports:
      - "4040:4040"   # Spark UI
      - "8888:8888"   # Jupyter Lab
      - "18080:18080" # Spark History Server
      - "8998:8998"   # Livy Server
    volumes:
      # Workspace
      - ..:/home/hadoop/workspace/

      # AWS Configuration (base read-only, specific overrides read-write)
      - ${HOME}/.aws:/home/hadoop/.aws:ro
      - ${HOME}/.aws/sso:/home/hadoop/.aws/sso
      - ${HOME}/.aws/cli:/home/hadoop/.aws/cli

      # SSH Keys
      - ${HOME}/.ssh:/home/hadoop/.ssh:ro

      # SFTP Keys (generated by init container)
      - sftp-keys:/var/sftp/keys:ro

      # Jupyter
      - awsglue-jupyter:/home/hadoop/workspace/jupyter_workspace

      # Glue Configuration
      - ./docker/awsglue:/home/hadoop/awsglue
      - ./docker/awsglue/notebooks:/home/hadoop/workspace/docker/notebooks
      - ./docker/awsglue/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf

      # Spark
      - spark-events:/tmp/spark-events
    networks:
      - glue-iceberg-network
    depends_on:
      sftp-keys-init:
        condition: service_completed_successfully

  # ============================================================
  # LocalStack for local AWS services
  # ============================================================
  localstack:
    image: localstack/localstack:4.8.1
    ports:
      - "4566:4566"   # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services port range
    # env_file:
      # - ../.env
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SERVICES=s3,glue,iam,sts,secretsmanager,ssm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      # LocalStack data persistence
      - localstack-data:/var/lib/localstack

      # Docker socket (for Lambda execution)
      - "/var/run/docker.sock:/var/run/docker.sock"

      # Init scripts (create secrets on startup)
      - ./docker/localstack/init.d:/etc/localstack/init/ready.d

      # SFTP Keys (generated by init container)
      - sftp-keys:/var/sftp/keys:ro
    networks:
      - glue-iceberg-network
    depends_on:
      sftp-keys-init:
        condition: service_completed_successfully

  # ============================================================
  # SFTP Server for testing file transfers
  # ============================================================
  sftp-server:
    image: atmoz/sftp:latest
    env_file:
      - ../.env
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      # Sample data files (read-only source)
      - ../assets/samples:/home/sftpuser/upload:ro

      # SFTP Keys (generated by init container)
      - sftp-keys:${SFTP_KEYS_DIR:-/keys}:ro

      # Custom entrypoint script
      - ./docker/sftp-server/entrypoint.sh:/custom-entrypoint.sh:ro
    networks:
      - glue-iceberg-network
    depends_on:
      sftp-keys-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/custom-entrypoint.sh"]

networks:
  glue-iceberg-network:
    driver: bridge

volumes:
  awsglue-jupyter:
    name: awsglue-jupyter
  localstack-data:
    name: localstack-data
  spark-events:
    name: spark-events
  sftp-keys:
    name: sftp-keys
